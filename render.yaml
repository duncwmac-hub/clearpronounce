# Render.com – one Web Service serves API + frontend at clearpronounce.com
# Docs: https://render.com/docs/deploy-fastapi
services:
  - type: web
    name: clearpronounce
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.backend.app:app --host 0.0.0.0 --port $PORT
    envVars: []
    # After first deploy: add custom domain clearpronounce.com in Render dashboard
    # and point Namecheap DNS to the URL Render gives you (e.g. CNAME to xxx.onrender.com).
